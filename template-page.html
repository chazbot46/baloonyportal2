  <script>
    let currentLoggedInUser = null;

    /**
     * Checks login status via /api/me and stores the user.
     * Called on DOMContentLoaded.
     * TODO: Wire up any login-gated UI elements here (enable buttons, show sections, etc.)
     */
    async function setupPage() {
      try {
        const res = await fetch("https://api.nic.baloony.xyz/api/me", {
          credentials: "include"
        });

        const data = await res.json();

        if (data.loggedIn) {
          currentLoggedInUser = data.user;
          // TODO: Handle logged-in state (enable buttons, show forms, etc.)
        } else {
          currentLoggedInUser = null;
          // TODO: Handle logged-out state (disable buttons, hide forms, etc.)
        }
      } catch (err) {
        currentLoggedInUser = null;
        // TODO: Handle error state
        console.error("Could not verify login status.", err);
      }
    }

    document.addEventListener("DOMContentLoaded", setupPage);
  </script>
